version: '3.8'
services:
  app:
    build: .  # Builds from your Dockerfile
    ports:
      - "8000:8000"  # Exposes FastAPI
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - MYSQL_URL=mysql+pymysql://oee_user:oee_pass@mysql:3306/oee_manufacturing  # Links to MySQL service
    depends_on:
      - mysql  # Starts after MySQL
    command: ["uvicorn", "main_app:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  mysql:
    image: mysql:latest
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: your_root_pass  # Set strong
      MYSQL_DATABASE: oee_manufacturing
      MYSQL_USER: oee_user
      MYSQL_PASSWORD: oee_pass
    volumes:
      - mysql-data:/var/lib/mysql  # Persists data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql  # Runs schema on startup (create schema.sql with CREATE TABLEs from earlier)

volumes:
  mysql-data: